<svg xmlns="http://www.w3.org/2000/svg" width="680" height="720" viewBox="0 0 680 720" role="img" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
<title>Proctoring and scheduling data topology</title>
<desc>Generic map of how learner, proctor, and admin actions write exam slots, sessions, snapshots, and reschedule data, and the shared users and exams catalog collections.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="0" y="0" width="680" height="720" fill="#ffffff"/>

<text x="40" y="24" font-size="14" font-weight="600" fill="#2c2c2a">Actors</text>
<text x="290" y="24" font-size="14" font-weight="600" fill="#2c2c2a">Collections</text>
<text x="560" y="24" font-size="14" font-weight="600" fill="#2c2c2a">Shared catalog</text>

<g>
<rect x="40" y="44" width="150" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="115" y="64" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Learner</text>
<text x="115" y="82" text-anchor="middle" font-size="12" fill="#5F5E5A">requests, sits exam</text>
</g>
<g>
<rect x="40" y="280" width="150" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="115" y="300" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Proctor</text>
<text x="115" y="318" text-anchor="middle" font-size="12" fill="#5F5E5A">admits, monitors</text>
</g>
<g>
<rect x="40" y="480" width="150" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="115" y="500" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Admin hub</text>
<text x="115" y="518" text-anchor="middle" font-size="12" fill="#5F5E5A">assigns, manages</text>
</g>

<g>
<rect x="270" y="44" width="160" height="46" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="350" y="71" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">examSlots</text>
</g>
<g>
<rect x="270" y="120" width="160" height="46" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="350" y="147" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">examSessions</text>
</g>
<g>
<rect x="270" y="196" width="160" height="46" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="350" y="223" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">examSnapshots/frames</text>
</g>
<g>
<rect x="270" y="272" width="160" height="46" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="350" y="299" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">rescheduleRequests</text>
</g>
<g>
<rect x="270" y="348" width="160" height="46" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="350" y="375" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">reassignmentRequests</text>
</g>
<g>
<rect x="270" y="424" width="160" height="46" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="350" y="451" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">notifications</text>
</g>
<g>
<rect x="270" y="500" width="160" height="46" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="350" y="527" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">auditLog</text>
</g>

<g>
<rect x="510" y="120" width="150" height="46" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="585" y="147" text-anchor="middle" font-size="14" font-weight="500" fill="#27500A">users/{uid}</text>
</g>
<g>
<rect x="510" y="196" width="150" height="46" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="585" y="223" text-anchor="middle" font-size="14" font-weight="500" fill="#27500A">exams</text>
</g>

<line x1="190" y1="60" x2="268" y2="62" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="190" y1="80" x2="268" y2="135" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="190" y1="88" x2="268" y2="288" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="190" y1="296" x2="268" y2="138" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="190" y1="305" x2="268" y2="212" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="190" y1="312" x2="268" y2="365" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="190" y1="498" x2="268" y2="68" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="190" y1="505" x2="268" y2="440" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="190" y1="515" x2="268" y2="516" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="430" y1="143" x2="508" y2="143" stroke="#a3a29c" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="430" y1="67" x2="508" y2="210" stroke="#a3a29c" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="468" y="158" text-anchor="middle" font-size="12" fill="#5F5E5A">join</text>

<rect x="40" y="600" width="16" height="16" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="62" y="612" font-size="12" fill="#5F5E5A">Actor</text>
<rect x="150" y="600" width="16" height="16" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="172" y="612" font-size="12" fill="#5F5E5A">Proctoring collection</text>
<rect x="350" y="600" width="16" height="16" rx="4" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="372" y="612" font-size="12" fill="#5F5E5A">Shared catalog</text>
<line x1="510" y1="608" x2="538" y2="608" stroke="#a3a29c" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="544" y="612" font-size="12" fill="#5F5E5A">lookup</text>

<text x="40" y="660" font-size="12" fill="#5F5E5A">All three actors are the same admin hub and certs hub pages in different roles.</text>
<text x="40" y="680" font-size="12" fill="#5F5E5A">users and exams are shared with the certification-data view.</text>
</svg>
